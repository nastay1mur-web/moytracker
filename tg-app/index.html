<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Трекер привычек</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #F5F7FA;
      min-height: 100vh;
      padding: 16px;
    }

    /* ─── ОФФЕР ─── */

    .offer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .offer-card {
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.35s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .offer-emoji {
      font-size: 64px;
      text-align: center;
      margin-bottom: 16px;
      line-height: 1;
    }

    .offer-title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      color: #000;
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .offer-subtitle {
      font-size: 16px;
      color: #666;
      text-align: center;
      line-height: 1.45;
      margin-bottom: 20px;
    }

    .offer-benefits {
      list-style: none;
      margin-bottom: 24px;
    }

    .offer-benefits li {
      font-size: 15px;
      color: #333;
      line-height: 1.4;
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .offer-benefits li::before {
      content: "✔";
      color: #2AABEE;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .offer-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      background: #2AABEE;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 14px;
    }

    .offer-btn:active {
      background: #1f96d4;
    }

    .offer-skip {
      display: block;
      text-align: center;
      color: #999;
      font-size: 14px;
      cursor: pointer;
      padding: 6px;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .offer-skip:active {
      color: #666;
    }

    /* ─── ТРЕКЕР ─── */

    .tracker {
      max-width: 420px;
      margin: 0 auto;
    }

    .tracker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 0 2px;
    }

    .tracker-title {
      font-size: 28px;
      font-weight: 700;
      color: #000;
    }

    .streak-total {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #FFE87C;
      border-radius: 30px;
      padding: 7px 13px;
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    /* ─── КАРТОЧКА ПРИВЫЧКИ ─── */

    .habit-card {
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: cardIn 0.3s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .habit-info {
      flex: 1;
      min-width: 0;
    }

    .habit-name {
      font-size: 15px;
      font-weight: 600;
      color: #000;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .habit-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .habit-category {
      background: #F0F0F5;
      border-radius: 12px;
      padding: 2px 9px;
      font-size: 11px;
      font-weight: 500;
      color: #555;
    }

    .habit-streak {
      font-size: 12px;
      color: #FF9500;
      font-weight: 500;
    }

    .habit-btn {
      flex-shrink: 0;
      background: #34C759;
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      min-width: 76px;
      transition: background 0.15s, transform 0.1s;
    }

    .habit-btn:active {
      background: #28ae4c;
      transform: scale(0.94);
    }

    .habit-btn.done {
      background: #D1D1D6;
      color: #8E8E93;
      pointer-events: none;
    }

    /* ─── ПРОГРЕСС ─── */

    .progress-wrap {
      margin-top: 20px;
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .progress-bar-bg {
      height: 8px;
      background: #EBEBEB;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #34C759;
      border-radius: 4px;
      width: 0%;
      transition: width 0.35s ease;
    }

    /* ─── ТЁМНАЯ ТЕМА ─── */

    @media (prefers-color-scheme: dark) {
      body { background: #1C1C1E; }
      .tracker-title, .habit-name { color: #fff; }
      .habit-card, .progress-wrap { background: #2C2C2E; }
      .offer-card { background: #2C2C2E; }
      .offer-title { color: #fff; }
      .offer-subtitle { color: #98989D; }
      .offer-benefits li { color: #E5E5EA; }
      .habit-category { background: #3A3A3C; color: #98989D; }
      .progress-label { color: #98989D; }
      .progress-bar-bg { background: #3A3A3C; }
    }
  </style>
</head>
<body>

  <!-- Контент рендерится JS -->
  <div id="root"></div>

  <script>
    (function () {

      // ── Данные ──────────────────────────────────────────────
      const DEFAULT_HABITS = [
        { id: 1, emoji: '💧', name: 'Выпить 8 стаканов воды',  category: 'Здоровье',     streak: 0, done: false },
        { id: 2, emoji: '🧘', name: 'Медитация 10 минут',      category: 'Осознанность', streak: 0, done: false },
        { id: 3, emoji: '🤸', name: 'Зарядка / Растяжка',      category: 'Фитнес',       streak: 0, done: false },
        { id: 4, emoji: '📖', name: 'Читать 20 страниц',       category: 'Развитие',     streak: 0, done: false },
        { id: 5, emoji: '🌙', name: 'Ложиться спать до 23:00', category: 'Сон',          streak: 0, done: false },
        { id: 6, emoji: '🌳', name: 'Прогулка 30 минут',       category: 'Активность',   streak: 0, done: false },
      ];

      const BOT_LINK = 'https://t.me/@tracker_privichka_bot?start=from_app';

      // ── Хранилище ───────────────────────────────────────────
      function load(key, fallback) {
        try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
        catch (e) { return fallback; }
      }

      function save(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
      }

      let habits = load('tg_habits', DEFAULT_HABITS.map(h => ({ ...h })));
      const offerShown = load('offerShown', false);

      // ── Telegram WebApp ─────────────────────────────────────
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }

      // ── Рендер ──────────────────────────────────────────────
      const root = document.getElementById('root');

      function renderTracker() {
        const done  = habits.filter(h => h.done).length;
        const total = habits.length;
        const totalStreak = habits.reduce((s, h) => s + h.streak, 0);
        const pct = total ? Math.round((done / total) * 100) : 0;

        root.innerHTML = `
          <div class="tracker">
            <div class="tracker-header">
              <h1 class="tracker-title">Мои привычки</h1>
              <div class="streak-total">🔥 ${totalStreak}</div>
            </div>

            ${habits.map(h => `
              <div class="habit-card" id="card-${h.id}">
                <div class="habit-info">
                  <div class="habit-name">${h.emoji} ${h.name}</div>
                  <div class="habit-meta">
                    <span class="habit-category">${h.category}</span>
                    <span class="habit-streak">🔥 ${h.streak} дней</span>
                  </div>
                </div>
                <button class="habit-btn ${h.done ? 'done' : ''}"
                        onclick="completeHabit(${h.id})"
                        ${h.done ? 'disabled' : ''}>
                  ${h.done ? 'Готово ✓' : 'Готово'}
                </button>
              </div>
            `).join('')}

            <div class="progress-wrap">
              <div class="progress-label">
                <span>Выполнено сегодня</span>
                <span id="prog-count">${done}/${total}</span>
              </div>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="prog-fill" style="width:${pct}%"></div>
              </div>
            </div>
          </div>
        `;
      }

      function renderOffer() {
        root.innerHTML = `
          <div class="tracker"><!-- пустой фон под оффером --></div>
          <div class="offer-overlay" id="offerOverlay">
            <div class="offer-card">
              <div class="offer-emoji">🎁</div>
              <h2 class="offer-title">Первый месяц бесплатно</h2>
              <p class="offer-subtitle">Подпишитесь на бота — получите промокод в личное сообщение</p>
              <ul class="offer-benefits">
                <li>Напоминания о воде, витаминах и других привычках в нужное время</li>
                <li>Каждое воскресенье подводим итог недели (в настройках можно отключить)</li>
                <li>Эксклюзивные акции для подписчиков</li>
              </ul>
              <a href="${BOT_LINK}" class="offer-btn">Первый месяц бесплатно</a>
              <span class="offer-skip" onclick="skipOffer()">Пропустить</span>
            </div>
          </div>
        `;
      }

      // ── Действия ────────────────────────────────────────────
      window.completeHabit = function (id) {
        const habit = habits.find(h => h.id === id);
        if (!habit || habit.done) return;

        habit.done   = true;
        habit.streak += 1;
        save('tg_habits', habits);

        // Обновляем кнопку без перерендера
        const btn = document.querySelector(`#card-${id} .habit-btn`);
        if (btn) {
          btn.classList.add('done');
          btn.disabled = true;
          btn.textContent = 'Готово ✓';
        }

        // Обновляем стрик в карточке
        const streakEl = document.querySelector(`#card-${id} .habit-streak`);
        if (streakEl) streakEl.textContent = `🔥 ${habit.streak} дней`;

        // Обновляем прогресс
        const done  = habits.filter(h => h.done).length;
        const total = habits.length;
        const pct   = Math.round((done / total) * 100);
        const fill  = document.getElementById('prog-fill');
        const count = document.getElementById('prog-count');
        if (fill)  fill.style.width    = pct + '%';
        if (count) count.textContent   = `${done}/${total}`;

        // Общий стрик в шапке
        const totalStreak = habits.reduce((s, h) => s + h.streak, 0);
        const badge = document.querySelector('.streak-total');
        if (badge) badge.textContent = `🔥 ${totalStreak}`;

        if (habits.every(h => h.done)) {
          setTimeout(() => alert('🎉 Все привычки на сегодня выполнены!'), 300);
        }
      };

      window.skipOffer = function () {
        const overlay = document.getElementById('offerOverlay');
        if (!overlay) return;
        overlay.style.transition = 'opacity 0.2s';
        overlay.style.opacity    = '0';
        setTimeout(() => {
          save('offerShown', true);
          renderTracker();
        }, 220);
      };

      // ── Запуск ──────────────────────────────────────────────
      offerShown ? renderTracker() : renderOffer();

    })();
  </script>
</body>
</html>
